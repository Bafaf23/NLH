{% extends "_base.html"%} {%block content%}
<div class="min-h-screen bg-white font-sans text-[#072146]">
  <nav class="p-4 flex justify-between items-center text-blue-800">
    <div class="flex items-center gap-3">
      <div
        class="text-4xl font-black tracking-tighter text-sky-800 select-none"
      >
        RB<span
          class="bg-gradient-to-tr from-blue-400 to-cyan-300 bg-clip-text text-transparent"
          >O</span
        >
      </div>
    </div>

    <div
      class="w-10 h-10 border-2 border-white/30 rounded-full flex items-center justify-center font-bold bg-cyan-500 text-cyan-300"
    >
      {{ session['name'][0] }}
    </div>
  </nav>

  <header
    class="text-white pt-2 pb-16 px-6 relative overflow-hidden flex justify-between items-center"
  >
    <h1 class="text-xl font-light text-sky-700">
      Hola, <span class="font-bold">{{ session['name'] }}</span>
    </h1>

    <a href="/logout" class="text-amber-400">
      <i
        class="fa-solid fa-arrow-right-from-bracket text-sm group-hover:-translate-x-1 transition-transform"
      ></i>
      <span class="font-bold text-sm uppercase tracking-wide"
        >Cerrar sesión</span
      >
    </a>
  </header>

  <main class="px-4 -mt-10 relative z-10">
    <section class="grid grid-cols-1 md:grid-cols-2 gap-2">
      <div class="bg-blue-900 p-3 rounded-md">
        <h2 class="font-bold text-white uppercase">Usarios registrados</h2>
        <span class="text-xl text-white font-bold"> {{user_total}}</span>
      </div>

      <div class="bg-blue-900 p-3 rounded-md">
        <h2 class="font-bold text-white uppercase">Usarios con rol de Administrador</h2>
        <span class="text-xl text-white font-bold"> {{user_total}}</span>
      </div>
    </section>
  </main>
</div>
{%endblock%}
