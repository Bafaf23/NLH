{% extends "_base.html" %} 

{% block content %}
<div
  class="min-h-screen bg-[url('https://png.pngtree.com/background/20250218/original/pngtree-aerial-view-of-turquoise-ocean-waves-on-a-sandy-beach-picture-image_16031981.jpg')] bg-cover bg-center flex flex-col p-5 text-white font-sans overflow-hidden gap-3"
>
  <div class="absolute inset-0 bg-blue-950/30"></div>

  <header class="relative z-10 pt-4 flex justify-between items-center">
    <div></div>

    <div
      class="text-4xl font-bold tracking-tighter text-white select-none"
    >
      RB<span class="text-blue-400">O</span>
    </div>

    <div class="flex flex-col items-center">
      <button
        class="bg-blue-900/80 backdrop-blur-md rounded-full w-10 h-10 flex justify-center items-center hover:bg-blue-800"
      >
        <i class="fa-solid fa-bars text-sm"></i>
      </button>
      <span class="text-[10px] uppercase font-bold mt-1">Menú</span>
    </div>
  </header>

  <main class="relative z-10 mt-10 flex justify-between flex-col gap-6">
    <section
      class="bg-white/80 backdrop-blur-4xl rounded-2xl p-6 shadow-2xl flex flex-col gap-6 border"
    >
      <div class="flex items-center gap-4">
        {% if user %}
        <div class="w-14 h-14 rounded-full border-2 border-blue-600 p-0.5">
          <img
            src="https://api.dicebear.com/7.x/avataaars/svg?seed={{ user.name }}"
            class="rounded-full"
          />
        </div>
        <h2 class="text-2xl font-light text-[#48C3C7] leading-tight">
          Hola, <br /><span class="font-bold">{{ user.name }}</span>
        </h2>
        {% else %}
        <h2 class="text-3xl text-[#48C3C7] font-bold tracking-tight">
          {{ saludo }}
        </h2>
        {% endif %}
      </div>

      <div class="space-y-3">
        <button
          class="bg-[#005B7F] hover:bg-[#3e6270] text-white rounded-lg font-bold py-4 w-full transition-all active:scale-[0.98] shadow-lg shadow-blue-900/20"
        >
          Iniciar sesión
        </button>

        <div class="flex justify-between items-center px-1">
          <p class="text-slate-500 text-sm">¿No tienes cuenta?</p>
          <a href="/auth" class="text-[#48C3C7] font-bold text-sm"
            >Hazte cliente</a
          >
        </div>
      </div>
    </section>

    <section class="bg-white rounded-2xl p-6 shadow-2xl flex flex-col gap-6">
      <div class="flex justify-between items-center">
        <h2 class="text-xl text-[#072146] font-bold tracking-tight">
          Noticias y novedades
        </h2>
        <span class="text-blue-600 text-xs font-bold uppercase cursor-pointer"
          >Ver todas</span
        >
      </div>
      <div class="flex flex-col gap-3">
        {%for item in news%}
        <div
          class="flex gap-4 group cursor-pointer border-b border-slate-100 pb-4 last:border-0 last:pb-0"
        >
          <div
            class="w-20 h-20 flex-shrink-0 rounded-xl overflow-hidden shadow-sm"
          >
            <img
              src="{{ item.img }}"
              class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
              alt="Noticia"
            />
          </div>

          <div class="flex flex-col justify-center">
            <span
              class="text-[10px] font-black uppercase text-blue-500 mb-1 tracking-widest"
            >
              {{ item.tag }}
            </span>
            <h3
              class="text-sm font-bold text-[#072146] leading-tight mb-1 group-hover:text-blue-600"
            >
              {{ item.title }}
            </h3>
            <p class="text-xs text-slate-500 line-clamp-2">{{ item.desc }}</p>
          </div>
        </div>
        {% endfor %}
      </div>
    </section>
  </main>
</div>
{% endblock %}
