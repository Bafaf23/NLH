{% extends "_base.html" %} {% block content %}
<div class="min-h-screen bg-[#F4F7F9] flex flex-col font-sans text-[#072146]">
  <header class="p-6 flex items-center gap-4">
    <a
      href="{{ url_for('home') }}"
      class="text-2xl hover:text-blue-600 transition-colors"
      >←</a
    >
    <h1 class="text-xl font-bold">Inisiar session</h1>
  </header>

  <main class="p-6 flex-1">
    <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
      <h2 class="text-2xl font-bold mb-6 italic">Únete</h2>

      <form action="" method="POST" class="space-y-6">
        <div>
          <label
            class="text-[10px] font-black uppercase text-slate-400 block mb-1"
            >Tipo de documento</label
          >
          <div class="flex gap-4 items-end">
            <div
              class="relative border-b-2 border-slate-200 focus-within:border-[#004481] transition-colors"
            >
              <select
                name="typeDocument"
                id="typeDocument"
                class="appearance-none bg-transparent py-2 pr-6 font-bold text-[#072146] outline-none cursor-pointer"
              >
                <option value="V-">V</option>
                <option value="E-">E</option>
                <option value="P-">P</option>
              </select>
              <div
                class="absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"
              >
                <svg
                  class="w-3 h-3"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 9l-7 7-7-7"
                  ></path>
                </svg>
              </div>
            </div>

            <input
              type="text"
              id="document"
              name="document"
              required
              class="flex-1 border-b-2 border-slate-200 py-2 focus:border-[#004481] outline-none transition-colors text-[#072146] font-medium"
              placeholder="Ej. 29384756"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label
              class="text-[10px] font-black uppercase text-slate-400 block mb-1"
              >Nombre</label
            >
            <input
              type="text"
              id="nameUser"
              name="nameUser"
              required
              class="w-full border-b-2 border-slate-200 py-2 focus:border-[#004481] outline-none transition-colors"
              placeholder="Ej. Bryant"
            />
          </div>

          <div>
            <label
              class="text-[10px] font-black uppercase text-slate-400 block mb-1"
              >Apellido</label
            >
            <input
              type="text"
              id="lastName"
              name="lastName"
              required
              class="w-full border-b-2 border-slate-200 py-2 focus:border-[#004481] outline-none transition-colors"
              placeholder="Ej. Lopez"
            />
          </div>
        </div>

        <div>
          <label
            class="text-[10px] font-black uppercase text-slate-400 block mb-1"
            >Fecha de nacimiento</label
          >
          <input
            type="date"
            id="birthdate"
            name="birthdate"
            required
            class="w-full border-b-2 border-slate-200 py-2 focus:border-[#004481] outline-none transition-colors"
            placeholder="tu@email.com"
          />
        </div>

        <div>
          <label
            class="text-[10px] font-black uppercase text-slate-400 block mb-1"
            >Correo electrónico</label
          >
          <input
            type="email"
            id="email"
            name="email"
            required
            class="w-full border-b-2 border-slate-200 py-2 focus:border-[#004481] outline-none transition-colors"
            placeholder="tu@email.com"
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="text-[10px] font-black uppercase text-slate-400 block mb-1"
              >Contraseña</label
            >
            <input
              type="password"
              id="password"
              name="password"
              required
              class="w-full border-b-2 border-slate-200 py-2 focus:border-[#004481] outline-none transition-colors"
              placeholder="*****"
            />
          </div>

          <div>
            <label
              class="text-[10px] font-black uppercase text-slate-400 block mb-1"
              >Confirma</label
            >
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              required
              class="w-full border-b-2 border-slate-200 py-2 focus:border-[#004481] outline-none transition-colors"
              placeholder="*****"
            />
          </div>
        </div>

        <div class="pt-4">
          <button
            type="submit"
            class="w-full bg-[#004481] text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 active:scale-95 transition-transform"
          >
            Continuar
          </button>
        </div>
      </form>
    </div>
  </main>

  <footer class="p-8 text-center">
    <p class="text-xs text-slate-400">
      Al continuar, aceptas nuestros términos y condiciones de seguridad.
    </p>
  </footer>
</div>
{% endblock %}
